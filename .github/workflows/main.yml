name: Build Kivy APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libssl-dev libffi-dev libgdbm-dev libc6-dev libbz2-dev zlib1g-dev cpuid abcde
          pip install --upgrade pip setuptools cython virtualenv buildozer

      - name: Build APK with Buildozer
        run: |
          # SDK Licenses auto-accept කිරීමට බිල්ඩ් එකට පෙරම පරිසරය සකසයි
          mkdir -p ~/.android
          touch ~/.android/repositories.cfg
          yes | buildozer android debug
        env:
          BUILDOZER_WARN_ON_ROOT: 0

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Android-APK
          path: bin/*.apk
